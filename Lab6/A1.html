<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. WAP to display faculties stored in array.
    </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        
        h1 {
            color: #333;
        }
        /* Styling for the container holding the cards */
        #container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        /* Styling for each individual faculty card */
        .faculty-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            width: 220px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .faculty-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #eee;
        }
        .faculty-card h3 {
            margin: 10px 0 5px 0;
            color: #007bff;
        }
        .faculty-card p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Faculty Members</h1>
    
    <script>
        facultyList = [
            {
            facultyName : "Prof. bala" , 
            image : "https://du-website.s3.ap-south-1.amazonaws.com/U01/Faculty-Photo/15---28-04-2023-02-07-35.jpg" ,
            sub : "FEWT" ,
            experience : 8
            },
            {
            facultyName : "Prof. jadeja" ,
            image : "https://du-website.s3.ap-south-1.amazonaws.com/U01/Faculty-Photo/6---28-04-2023-02-06-07.jpg" ,
            sub : "DS" ,
            experience : 18
            },
            {
            facultyName : "Prof. Gambhava" ,
            image : "https://du-website.s3.ap-south-1.amazonaws.com/U01/Faculty-Photo/3---28-04-2023-02-02-42.jpg" ,
            sub : "DAA" ,
            experience : 10
            },
        ]

 
        for(i=0 ; i<facultyList.length ; i++){
              document.write("faculty name :  ", facultyList[i].facultyName,"<br/>")
             document.write("<img src=\"" + facultyList[i].image + "\"/>"); 
             document.write("<br/>")
             document.write(`<img src="${facultyList[i].image}"/>`) 
             
        }
         
     </script>
</body>
</html>
