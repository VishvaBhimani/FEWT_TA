<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Demonstrate the Arrow functions. (A)</title>
</head>
<body>
    <script>
        const HelloWorld = () =>{
            return "hello world"
        }
        document.write(HelloWorld()+"<br/>")

        const greet = (name) =>{
            return `welcome ${name}`
        }
        document.write(greet("vishva")+"<br/>")

        const square = (n) =>{
             return n*n 
        }
        document.write(square(5))
    </script>
</body>
</html>
