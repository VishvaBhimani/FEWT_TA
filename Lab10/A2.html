<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. Demonstrate how to create a class in Java Script. (A)</title>
</head>
<body>
    <script>
         
class Student {

  
  constructor(givenName, givenAge) {
    this.name = givenName;   
    this.age = givenAge;     
  }

   
  introduce() {
    document.write("Hello, my name is " + this.name + " and I am " + this.age + " years old!"+ "<br/>");
  }
}


const student1 = new Student("Vishva", 18); 
const student2 = new Student("bhimani", 20);


student1.introduce(); 
student2.introduce();  
    </script>
</body>
</html>
