 <!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Snake Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #game {
            width: 100vw;
            height: 100vh;
            background: #dff6dd;
            position: relative;
            overflow: hidden;
        }

        #snake {
            width: 40px;
            height: 40px;
            position: absolute;
            left: 20px;
            top: 100px;
        }

        #food {
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            position: absolute;
        }

        #scoreBox {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 25px;
            font-weight: bold;
            z-index: 100;
        }

        #lifeBox {
            position: absolute;
            top: 50px;
            left: 20px;
            font-size: 25px;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>

<body>

    <div id="scoreBox">
        Score : <span id="score">0</span>
    </div>

    <div id="lifeBox">
        Lives : <span id="life">2</span>
    </div>

    <script>

        let game = document.getElementById("game");
        let snake = document.getElementById("snake");
        let food = document.getElementById("food");

        let score = document.getElementById("score");
        let life = document.getElementById("life");

        let x = 20;
        let y = 100;

        let total = 0;
        let lives = 2;

        // Initial food
        changeFood();
        snake.style.left = x + "px";
        snake.style.top = y + "px";

        document.addEventListener("keydown", moveSnake);

        function moveSnake(e) {

            if (e.key == "ArrowRight")
                x += 20;

            if (e.key == "ArrowLeft")
                x -= 20;

            if (e.key == "ArrowUp")
                y -= 20;

            if (e.key == "ArrowDown")
                y += 20;

            // Border check
            if ( x < 0 || y < 0 ||x > game.clientWidth - 40 || y > game.clientHeight - 40) {

                lives--;
                life.innerHTML = lives;

                if (lives == 0) {

                    alert("Game Over\n\nScore : " + total);
                    location.reload();

                }

                x = 20;
                y = 100;

            }

            snake.style.left = x + "px";
            snake.style.top = y + "px";

            checkFood();

        }

        function checkFood() {

            let snakeLeft = x;
            let snakeTop = y;
            let snakeRight = x + 40;
            let snakeBottom = y + 40;

            let foodLeft = parseInt(food.style.left);
            let foodTop = parseInt(food.style.top);
            let foodRight = foodLeft + 20;
            let foodBottom = foodTop + 20;

            if (snakeRight >= foodLeft &&snakeLeft <= foodRight &&snakeBottom >= foodTop &&snakeTop <= foodBottom) {

                total++;
                score.innerHTML = total;

                changeFood();

            }

        }

        function changeFood() {

            let maxX = Math.floor((game.clientWidth - 20) / 20);
            let maxY = Math.floor((game.clientHeight - 20) / 20);

            let fx = Math.floor(Math.random() * maxX) * 20;
            let fy = Math.floor(Math.random() * maxY) * 20;

            food.style.left = fx + "px";
            food.style.top = fy + "px";

        }

    </script>
