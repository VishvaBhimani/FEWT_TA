<!doctype html>
<html>
  <head>
    <title>Mouse Event Example</title>
  </head>
  <body>
    <h2 id="message">Click anywhere on the page</h2>

    <script>
      document.addEventListener("mousedown", function (event) {
        if (event.button == 0) {
          document.getElementById("message").innerHTML = "Left Clicked";
        } else if (event.button == 2) {
          document.getElementById("message").innerHTML = "Right Clicked";
        }
      });

 
      document.addEventListener("contextmenu", function (event) {
        event.preventDefault();
      });
    </script>
  </body>
</html>
