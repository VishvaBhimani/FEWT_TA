<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .color-change{
            height: 100px;
            width: 100px;
            animation-name: first;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            
        }
        @keyframes first {
             from{
                background-color: red;
             }
             to{
                background-color: yellow;
             }
        }
        .moving-div{
            position: relative;
            height: 100px;
            width: 100px;
            animation-name: moving_div;
            animation-iteration-count: infinite;
            animation-duration: 5s;  
            /* it is mandatory duration */
            background-color: red;
            animation-delay: 2s;
            animation-direction: reverse;
            animation-timing-function: ease-in;
        }
        @keyframes  moving_div {
            0%{
                top: 0px;
                left: 0px;
            }
            25%{
                top: 0px;
                left: 100px;
            }
            50%{
                top: 100px;
                left: 100px;
            }
            75%{
                top: 100px;
                left: 0px;
            }
            100%{
                top: 0px;
                left: 0px;
            }
            
        }
        #link{
            color: orange;
        }
        #link:visited{
            /* //here space is not allowed in :visited before */
            color: red;
        }
        .par::first-line{
            background-color: red;
            font-size: larger;
            font-style: italic;
        }
        .par::first-letter{
            background-color: yellow;
            font-size: xx-large;
            font-style: oblique;
            font-weight: 600;
        }
        .par::selection{
            background-color: blue;
        }
        .newdiv{
            background-color: red;
            height: 100px;
            width: fit-content;
            
        }
        .newdiv:hover{
            background-color: yellow;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="color-change"></div> 
     <div class="moving-div"></div> 
    <a href="https://www.flipkart.com/" id="link" target="_blank"> click here</a>
    <!-- <!-- target="_blank" for open link in new tabe -->
      <p class="par">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Libero distinctio
         voluptatum porro labore blanditiis doloremque dolorem explicabo, nemo ullam odio veniam consequuntu
        r, sapiente minima, placeat tempora hic ex fuga maxime.</p>
    <div class="newdiv">this is new div</div>

</body>
</html>
