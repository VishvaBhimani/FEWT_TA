<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      4. WAP to read an array form the user and sort them using quick sort. (B)
    </title>
  </head>
  <body>
    <script>
      function quickSort(arr) {
         
        if (arr.length <= 1) {
          return arr;
        }
         
        let pivot = arr[arr.length - 1];

        let left = [];  //smaller number
        let right = []; //bigger

        
         
        for (let i = 0; i < arr.length - 1; i++) {
          if (arr[i] < pivot) {
            left.push(arr[i]);  
          } else {
            right.push(arr[i]);  
          }
        }

       let sortedLeft = quickSort(left);
       let sortedRight = quickSort(right);

       
        let mergedResult = [];

        for (let i = 0; i < sortedLeft.length; i++) {
          mergedResult.push(sortedLeft[i]);
        }

        mergedResult.push(pivot);

        
        for (let i = 0; i < sortedRight.length; i++) {
          mergedResult.push(sortedRight[i]);
        }

        return mergedResult;
      }

       
      let userArray = [231,9,4, 3,3, 5, 1,0,111];
      document.write("Original Array: ", userArray,"<br/>");

      let sortedResult = quickSort(userArray);
      document.write("Sorted Array:   ", sortedResult);
      

    </script>
  </body>
</html>
