<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      3. WAP to read an array from the user and sort them using bubble sort. (A)
    </title>
  </head>
  <body>
    <script>
       
       var arr = [23, 10, 45, 8, 15];
       var n = arr.length;

       document.write("Original Array: " + arr);

      for (var i = 0; i < n - 1; i++) { 
        // i consider as pass 1, 2 ,3 etc..
        for (var j = 0; j < n - 1 - i; j++) {
          
          if (arr[j] > arr[j + 1]) {
            var temp = arr[j];
            arr[j] = arr[j + 1];
            arr[j + 1] = temp;
          }
        }
      }

      document.write("Sorted Array:   " + arr);
    </script>
  </body>
</html>
