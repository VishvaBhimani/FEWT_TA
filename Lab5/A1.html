<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstrate the use of array to ƒind maximum number. (A)</title>
</head>
<body>
    <script>
        num = prompt("enter number saprated by comma")
        arr = num.split(',').map(Number)

        max = arr[0]
        for(i=1 ; i<arr.length ; i++){
            if(max<arr[i]){
                max = arr[i]
            }
        }
        document.write("max number is :",max)
    </script>
</body>
</html>
