<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. WAP to read an array from the user and sort them in ascending order. (A)</title>
</head>
<body>
    <script>
         num = prompt("enter number saprated by comma")
         arr = num.split(',').map(Number)
    
         for(i=0 ; i<arr.length ; i++){
            for(j=i+1 ; j<arr.length ; j++){
                if(arr[i]>arr[j]){
                    swap = arr[i]
                    arr[i] = arr[j]
                    arr[j] = swap
                }
            }
         }
         document.write("final acending array is : ", arr)
    </script>
    
</body>
</html>
