<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6. WAP in JavaScript to check whether the given number is Armstrong or not. (A)</title>
</head>
<body>
    <script>
        num = parseInt(prompt("Enter a number "))
        temp = num;
        count = 0;
        ans = 0;
       for(;temp!=0;temp=Math.floor(temp/10)){
        count++;
       }
       temp=num;
       for(;temp!=0;temp=Math.floor(temp/10)){
            rem = (temp%10)
            ans += rem**count
            
       }

       if(ans==num){
        document.write("armstrong number")
       }
       else{
        document.write("not armstrong")

    }

    </script>
    
</body>
</html>
