<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. WAP in JavaScript to ƒnd the factorial of given number. (A)
</title>
</head>
<body>
    <script>
        num = parseInt(prompt("Enter a number to get its factorial. "));
        ans= 1;
        for(i = 1; i<=num;i++){
            ans*=i;
        }
        alert(num+ "! = "+ans)
    </script>
</body>
</html>
