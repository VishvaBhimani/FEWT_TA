<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. WAP in JavaScript to check whether the given no. is prime or not. (A)</title>
</head>
<body>
    <script>
        num = parseInt(prompt("Enter a number to check if its prime or not."));
        flag =0;
        for(i =2;i<num;i++){
            if(num%i === 0){
                flag = 1;
                break;
            }
        }
        if (flag===1){
            alert(num +"is not prime.");
        }
        else{
            alert(num+"is prime.");
        }
    </script>
    
</body>
</html>
