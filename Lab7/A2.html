<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }
        .form-container {
            background-color: white;
            max-width: 450px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }
        input {
            width: 94%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #27ae60;
        }
        /* Error text style */
        .error-list {
            color: #e74c3c;
            font-weight: bold;
            font-size: 14px;
            margin-top: 15px;
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>User Registration</h2>
        
        <form  onsubmit="return  validateForm(event)">
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Min 8 characters" required>
            </div>

            <div class="form-group">
                <label>Enrollment No.</label>
                <input type="text" id="enrollment" placeholder="Exactly 11 digits" required>
            </div>

            <div class="form-group">
                <label>Email ID</label>
                <input type="text" id="email" placeholder="example@domain.com" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="8-12 chars, 1 digit, 1 special symbol" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPass" placeholder="Repeat your password" required>
            </div>

            <button type="submit">Register</button>
        </form>

        <ul id="errorDisplay" class="error-list"></ul>
    </div>

    <script>
        function validateForm(event) {

            let username = document.getElementById("username").value;
            let enrollment = document.getElementById("enrollment").value;
            let email = document.getElementById("email").value;
            let dob = document.getElementById("dob").value;
            let password = document.getElementById("password").value;
            let confirmPass = document.getElementById("confirmPass").value;
            let errorDisplay = document.getElementById("errorDisplay");
            errorDisplay.innerHTML= ""; 

            let errors = [];
            
            if (username.length < 8) {
                errors.push("Username must be at least 8 characters.");
            }

            if (password.length < 8 || password.length > 12) {
                errors.push("Password must be between 8 and 12 characters.");
            }

            let hasDigit = /\d/.test(password);
            let hasSpecial = /[^A-Za-z0-9]/.test(password);

            if (!hasDigit) {
                errors.push("Password must contain at least 1 digit.");
            }
            if (!hasSpecial) {
                errors.push("Password must contain at least 1 special character.");
            }

            if (password !== confirmPass) {
                errors.push("Passwords do not match.");
            }

            if (dob) {
                let birthDate = new Date(dob);
                let today = new Date();
                
                let age = today.getFullYear() - birthDate.getFullYear();

                if (age < 18) {
                    errors.push("Age must be greater than 18.");
                }
            }

            // isNaN checks if it's NOT a number
            if (enrollment.length !== 11 || isNaN(enrollment)) {
                errors.push("Enrollment must be exactly 11 numeric digits.");
            }
                 let emailPattern = /^[a-zA-Z0-9]+@[a-zA-Z]+\.[a-zA-Z]{2,27}$/;

                if (!emailPattern.test(email)) {
                errors.push("Please enter a valid Email ID.");
            }



            if (errors.length > 0) {
                for(i=0 ; i<errors.length ; i++){
                    errorDisplay.innerHTML += "<li>" + errors[i] + "</li>";
                }
                
                return false;
            }

            alert("Validation successful! Form submitted.");
            return true; 
        }
    </script>

</body>
</html>
