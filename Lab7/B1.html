<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. WAP to create a static login page using HTML and JavaScript. (B)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Changed this to form for styling */
        form.login-card {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 280px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input {
            width: 92%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        #error-msg {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #e74c3c; /* Red color for error */
        }
    </style>
</head>
<body>

    <form class="login-card" onsubmit="validateLogin(event)">
        <h2>Login</h2>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="userInput" placeholder="Enter 'admin'" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="passInput" placeholder="Enter '1234'" required>
        </div>

        <button type="submit">Submit</button>
        <p id="error-msg"></p>
         
    </form>

    <script>
        function validateLogin(event){
            let typedUser = document.getElementById("userInput").value;
            let typedPass = document.getElementById("passInput").value;
            let errorText = document.getElementById("error-msg"); 

           
            if(typedUser !== 'admin' || typedPass !== "1234"){
                
               
                event.preventDefault(); 
                
                errorText.innerHTML = "ERROR: Invalid Credentials!";
            }
            
        }
    </script>
</body>
</html>

and when we just write innnertext it consider all code as string  -->
