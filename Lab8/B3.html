<!DOCTYPE html>
<html>
<head>
    <title>Mouse Events</title>
</head>
<body>

<h1 id="heading" onmouseover="yellowColor()" onmouseout="blackColor()">Welcome</h1>

<button onclick="showTime()">Find Time</button>

<br><br>

<button onclick="redColor()">Red</button>
<button onclick="greenColor()">Green</button>

<p id="time"></p>

<script>

function yellowColor(){
    document.getElementById("heading").style.color = "yellow";
}

function blackColor(){
    document.getElementById("heading").style.color = "black";
}

function showTime(){
    let d = new Date();

    document.getElementById("time").innerHTML = d;
}

function redColor(){
    document.body.style.backgroundColor = "red";
}

function greenColor(){
    document.body.style.backgroundColor = "green";
}

</script>

</body>
</html>
