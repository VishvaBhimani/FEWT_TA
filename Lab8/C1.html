<!DOCTYPE html>
<html>
<head>
    <title>CRUD Operation</title>
</head>5
<body>

<h2>CRUD Operation on Array</h2>

<input type="text" id="txtName" placeholder="Enter Name">

<button onclick="addItem()">Add</button>
<button onclick="updateItem()">Update</button>
<button onclick="deleteItem()">Delete</button> 
<button onclick="showItem()">Show</button>

<p id="result"></p>

<script>

let arr = [];

function addItem(){
    let name = document.getElementById("txtName").value;

    arr.push(name);

    document.getElementById("result").innerHTML = arr;
}

function showItem(){
    document.getElementById("result").innerHTML = arr;
}

function updateItem(){
    let oldName = prompt("Enter name to update");
    let newName = prompt("Enter new name");

    let index = arr.indexOf(oldName);

    if(index == -1) {
         alert("Name not found");
    }
    else {
              arr[index] = newName;
    }

    document.getElementById("result").innerHTML = arr;
}

function deleteItem(){
    let name = prompt("Enter name to delete");

    let index = arr.indexOf(name);

    if(index == -1) {
          alert("Name not found");
    }
    else {
         arr.splice(index,1);
    }

    document.getElementById("result").innerHTML = arr;
}

</script>

</body>
</html>
