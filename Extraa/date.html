      document.write("<h2>Program 4 : Current Date and Time</h2>");

      let today = new Date();

      document.write("Current Date : " + today + "<br>");
      document.write("Day : " + today.getDate() + "<br>");
      document.write("Month : " + (today.getMonth() + 1) + "<br>");

      document.write("Hours : " + today.getHours() + "<br>");
      document.write("Minutes : " + today.getMinutes() + "<br>");
      document.write("Seconds : " + today.getSeconds());

      document.write("<h2>Program 5 : Calculate Age</h2>");

      let birthYear = parseInt(prompt("Enter Birth Year"));
