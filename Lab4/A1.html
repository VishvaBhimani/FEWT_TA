<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. WAP in JavaScript to print the factors of given number. (A)</title>
</head>
<body>
     
    <script>
        num = parseInt(prompt("Enter a number to get its factors:"));   
          ans ="1"
        for(i=2;i<=num;i++){
            if(num%i===0){
                ans += "," + i + " " 
            }
        }
        alert("The factors of "+num+" are: "+ ans);
    </script>
    
</body>
</html>
