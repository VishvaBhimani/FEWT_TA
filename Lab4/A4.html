<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. WAP in JavaScript to print the GCD of two number. (A)</title>
</head>
<body>
    <h1>4. WAP in JavaScript to print the GCD of two number. (A)</h1>
    <script>
        n1=parseInt(prompt("Enter the first number: "));
        n2 = parseInt(prompt("Enter the second number."))
        small = (n1 < n2) ? n1 : n2;
        for (i = small; i >= 1; i--) {
            if (n1 % i == 0 && n2 % i == 0) {
               alert("The GCD of " + n1 + " and " + n2 + " is: " + i);
                break;
            }
        }
    </script>
</body>
</html>
